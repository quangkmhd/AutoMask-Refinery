<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Review Tool Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <style>
        .image-card {
            cursor: grab;
            transition: all 0.2s;
            position: relative;
            min-height: 200px; /* Larger min-height for better grid stability */
            display: flex;
            flex-direction: column;
        }
        .image-card:active {
            cursor: grabbing;
        }
        .image-card img {
            pointer-events: none; /* Tránh bị browser kéo ảnh mặc định */
        }
        .ghost {
            opacity: 0.4;
            background: #c8ebfb;
        }
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">
    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        <p class="mt-2 font-semibold">Processing images...</p>
    </div>

    <!-- Header -->
    <header class="bg-white shadow-sm p-4 flex justify-between items-center z-50 border-b">
        <div class="flex items-center gap-4">
            <div>
                <h1 id="folder-title" class="text-lg font-bold text-gray-800">Loading...</h1>
                <p id="folder-stats" class="text-xs text-blue-600 font-semibold"></p>
            </div>
            <div class="flex items-center gap-2 border-l pl-4">
                <input type="text" id="jump-index" placeholder="Index or Name" class="border rounded px-2 py-1 text-sm w-32" onkeydown="if(event.key==='Enter') jumpToIndex()">
                <button onclick="jumpToIndex()" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm font-semibold">JUMP</button>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="bulk-fail-btn" onclick="applyBulkMove('fail')" class="hidden bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition-all">MOVE SELECTED TO FAILED</button>
            <button id="bulk-pass-btn" onclick="applyBulkMove('pass')" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition-all">MOVE SELECTED TO PASSED</button>
            <div id="bulk-separator" class="hidden w-px bg-gray-300 mx-1"></div>
            <button onclick="saveAndNext()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-lg font-bold text-sm shadow-md transition-all active:scale-95">SAVE & NEXT FOLDER</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex p-3 gap-3 overflow-hidden">
        <!-- Pass Side -->
        <div class="flex-1 flex flex-col bg-white rounded-xl shadow-inner border border-green-200 overflow-hidden">
            <div class="bg-green-100 p-2 flex justify-between items-center px-4">
                <h2 class="font-bold text-green-800 uppercase tracking-wider text-sm">✓ Passed Area</h2>
                <span id="pass-count" class="bg-green-600 text-white text-xs px-2 py-0.5 rounded-full">0</span>
            </div>
            <div id="pass-list" class="flex-grow overflow-y-auto p-3 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 auto-rows-max content-start">
                <!-- Pass images -->
            </div>
        </div>

        <!-- Fail Side -->
        <div class="flex-1 flex flex-col bg-white rounded-xl shadow-inner border border-red-200 overflow-hidden">
            <div class="bg-red-100 p-2 flex justify-between items-center px-4">
                <h2 class="font-bold text-red-800 uppercase tracking-wider text-sm">✗ Failed Area</h2>
                <span id="fail-count" class="bg-red-600 text-white text-xs px-2 py-0.5 rounded-full">0</span>
            </div>
            <div id="fail-list" class="flex-grow overflow-y-auto p-3 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 auto-rows-max content-start">
                <!-- Fail images -->
            </div>
        </div>
    </main>

    <script>
        let folders = [];
        let currentFolderIndex = 0;
        let currentImages = [];
        let overrides = {}; 
        let selectedIds = new Set(); 

        const passList = document.getElementById('pass-list');
        const failList = document.getElementById('fail-list');
        const loading = document.getElementById('loading-overlay');

        function showLoading(show) {
            loading.style.display = show ? 'flex' : 'none';
        }

        // SortableJS Configuration
        const sortableOptions = {
            group: 'shared',
            animation: 200,
            ghostClass: 'ghost',
            onEnd: function (evt) {
                const id = evt.item.dataset.id;
                const newStatus = evt.to.id === 'pass-list' ? 'pass' : 'fail';
                updateImageStatus(id, newStatus);
            }
        };

        new Sortable(passList, sortableOptions);
        new Sortable(failList, sortableOptions);

        async function init() {
            showLoading(true);
            try {
                const res = await fetch('/api/folders');
                folders = await res.json();
                if (folders.length > 0) {
                    await loadFolder(0);
                }
            } catch (e) { console.error(e); }
            showLoading(false);
        }

        async function loadFolder(index) {
            showLoading(true);
            currentFolderIndex = index;
            const folderName = folders[index];
            document.getElementById('folder-title').innerText = `${folderName} [${index + 1}/${folders.length}]`;
            document.getElementById('jump-index').value = index + 1;
            
            try {
                const res = await fetch(`/api/images/${folderName}`);
                const data = await res.json();
                
                currentImages = data.images;
                overrides = {};
                // Initialize overrides if current status differs from algo
                currentImages.forEach(img => {
                    if ((img.status === 'pass' && img.algo_failed) || (img.status === 'fail' && !img.algo_failed)) {
                        overrides[img.id] = img.status;
                    }
                });

                renderImages();
            } catch (e) { console.error(e); }
            showLoading(false);
        }

        async function jumpToIndex() {
            const val = document.getElementById('jump-index').value.trim();
            if (!val) return;

            // If it's purely numeric, treat as index
            if (/^\d+$/.test(val)) {
                const index = parseInt(val);
                if (index >= 1 && index <= folders.length) {
                    await loadFolder(index - 1);
                    return;
                }
            }

            // Otherwise, search by name (substring match)
            const foundIndex = folders.findIndex(f => f.toLowerCase().includes(val.toLowerCase()));
            if (foundIndex !== -1) {
                await loadFolder(foundIndex);
            } else {
                alert(`Cannot find folder with index or name containing: "${val}"`);
            }
        }

        function renderImages() {
            passList.innerHTML = '';
            failList.innerHTML = '';

            currentImages.forEach(img => {
                const status = overrides[img.id] || (img.algo_failed ? 'fail' : 'pass');
                const isSelected = selectedIds.has(img.id);
                const card = document.createElement('div');
                card.className = `image-card rounded-lg border-2 shadow-sm overflow-hidden transition-all ${isSelected ? 'border-blue-500 ring-2 ring-blue-200 ring-opacity-50' : 'border-transparent bg-gray-50'}`;
                card.dataset.id = img.id;
                card.innerHTML = `
                    <div class="relative group flex-grow bg-neutral-900 overflow-hidden cursor-pointer" onclick="toggleSelect('${img.id}')">
                        <img src="${img.img_url}" class="w-full h-48 object-contain block group-hover:scale-105 transition-transform duration-500" loading="lazy">
                        
                        <!-- Checkbox Overlay -->
                        <div class="absolute top-2 left-2 w-5 h-5 rounded border-2 flex items-center justify-center ${isSelected ? 'bg-blue-500 border-blue-500' : 'bg-black/20 border-white/50'}">
                            ${isSelected ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>

                        <!-- ID Label at Top-Right -->
                        <div class="absolute top-0 right-0 bg-black bg-opacity-50 text-white text-[9px] px-1.5 py-0.5 rounded-bl opacity-60">
                            ${img.id}
                        </div>

                        <!-- Quick Action at Bottom -->
                        <div class="absolute inset-x-0 bottom-0 flex items-end justify-center p-2 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-2 group-hover:translate-y-0">
                             <div class="w-full bg-white/20 text-white text-center font-bold py-1 px-4 rounded text-[10px] backdrop-blur-sm border border-white/30">
                                CLICK TO SELECT
                             </div>
                        </div>
                    </div>
                `;

                if (status === 'pass') {
                    passList.appendChild(card);
                } else {
                    failList.appendChild(card);
                }
            });

            updateStats();
        }

        function updateImageStatus(id, newStatus) {
            const img = currentImages.find(i => i.id === id);
            if (!img) return;

            const originalAlgoStatus = img.algo_failed ? 'fail' : 'pass';
            if (newStatus !== originalAlgoStatus) {
                overrides[id] = newStatus;
            } else {
                delete overrides[id];
            }
            updateStats();
        }

        function quickMove(id, newStatus) {
            // Deprecated - using toggleSelect now
            updateImageStatus(id, newStatus);
            renderImages();
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            renderImages();
        }

        function applyBulkMove(targetStatus) {
            selectedIds.forEach(id => {
                updateImageStatus(id, targetStatus);
            });
            selectedIds.clear();
            renderImages();
        }

        function updateStats() {
            const passLen = passList.children.length;
            const failLen = failList.children.length;
            document.getElementById('pass-count').innerText = passLen;
            document.getElementById('fail-count').innerText = failLen;
            
            const manualChanges = Object.keys(overrides).length;
            document.getElementById('folder-stats').innerText = `Total: ${currentImages.length} | Manual Changes: ${manualChanges} | Selected: ${selectedIds.size}`;

            // Show/Hide bulk buttons
            const bulkFail = document.getElementById('bulk-fail-btn');
            const bulkPass = document.getElementById('bulk-pass-btn');
            const bulkSep = document.getElementById('bulk-separator');
            
            if (selectedIds.size > 0) {
                bulkFail.classList.remove('hidden');
                bulkPass.classList.remove('hidden');
                bulkSep.classList.remove('hidden');
            } else {
                bulkFail.classList.add('hidden');
                bulkPass.classList.add('hidden');
                bulkSep.classList.add('hidden');
            }
        }

        async function saveAndNext() {
            showLoading(true);
            const folderName = folders[currentFolderIndex];
            selectedIds.clear(); 
            
            try {
                await fetch('/api/save_review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        folder: folderName,
                        overrides: overrides
                    })
                });

                if (currentFolderIndex < folders.length - 1) {
                    await loadFolder(currentFolderIndex + 1);
                    passList.scrollTop = 0;
                    failList.scrollTop = 0;
                } else {
                    alert("CONGRATULATIONS! All folders reviewed.");
                }
            } catch (e) { 
                console.error(e);
                alert("Error saving data!");
            }
            showLoading(false);
        }

        init();
    </script>
</body>
</html>
